name: CI

on:
  push:
    branches: [main]
  pull_request:

# Two jobs that mirror the local validation matrix (see docs/validation.md):
#   validate    -> the offline gate, equivalent to `pnpm validate`
#   integration -> the live-service gate, equivalent to `pnpm validate:integration`
jobs:
  # ---- Offline gate: no databases, no network services ----
  validate:
    name: Validate (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Web demo tests
        run: pnpm test:web

      - name: Web demo build
        run: pnpm build:web

      - name: Schema drift check
        run: pnpm db:check

      - name: Whitespace check
        run: pnpm check:whitespace

  # ---- Live-service gate: PostgreSQL + Redis (Mailpit is not exercised here) ----
  integration:
    name: Integration (PostgreSQL + Redis)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: orgistry
          POSTGRES_PASSWORD: orgistry
          POSTGRES_DB: orgistry
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orgistry"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    # Mailpit is intentionally omitted — no integration test exercises email
    # delivery. The invitation mailer is covered by unit tests; the live SMTP
    # path is verified manually via the local Mailpit container. See
    # docs/known-limitations.md.
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://orgistry:orgistry@localhost:5432/orgistry
      TEST_DATABASE_URL: postgres://orgistry:orgistry@localhost:5432/orgistry_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-value-1234
      COOKIE_SECRET: ci-cookie-secret-value-1234

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create test database
        run: psql "$DATABASE_URL" -c 'CREATE DATABASE orgistry_test;'

      - name: Apply migration baseline (dev database)
        run: pnpm db:migrate

      # Resets the test database to the migration baseline, then runs the DB
      # migration-from-scratch test plus the live API readiness + route
      # integration tests against PostgreSQL + Redis. Equivalent to
      # `pnpm validate:integration`.
      - name: Integration tests
        run: pnpm validate:integration
